version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: notifyhub-postgres
    environment:
      POSTGRES_USER: notifyhub
      POSTGRES_PASSWORD: notifyhub123
      POSTGRES_DB: notifyhub_db
    ports:
      - "5432:5432"
    volumes:
      - notifyhub_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: notifyhub-redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: notifyhub-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  notifyhub_pg_data: